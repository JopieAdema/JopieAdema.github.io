name: Update World Cup predictions

# Refreshes _data/worldcup.json from live correct-score odds once per day.
# Provider: odds-api.io (free tier = 5000 requests/HOUR). Each run uses a couple
# of lookups + one odds call per fixture (~10/day), far within the limit.
# Need it fresher? "0 */6 * * *" (4x/day) or "0 */3 * * *" (8x/day).
on:
  schedule:
    - cron: "0 13 * * *"    # 13:00 UTC = 15:00 Munich (CEST) during the tournament
  workflow_dispatch:        # allows a manual run from the Actions tab any time

permissions:
  contents: write

# avoid overlapping runs racing on the same push
concurrency:
  group: worldcup-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release

      - name: Install dependencies
        run: Rscript -e 'install.packages(c("jsonlite","curl"), repos="https://cloud.r-project.org")'

      - name: Compute predictions
        env:
          ODDSAPIIO_KEY: ${{ secrets.ODDSAPIIO_KEY }}
        run: Rscript scripts/worldcup_predictions.R

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/worldcup.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update World Cup predictions"
            git pull --rebase --autostash
            git push
          fi
