name: Update World Cup predictions

# Refreshes _data/worldcup.json from live correct-score odds once per day.
# Provider: API-Football (free tier = 100 requests/DAY). Each run uses ~1 call
# per fixture + 2 lookups (~6-14/day), well within the daily limit.
# Need it fresher? "0 */12 * * *" or "0 */6 * * *" — keep total calls/day < 100.
on:
  schedule:
    - cron: "0 6 * * *"     # 06:00 UTC daily (~08:00 Munich in summer)
  workflow_dispatch:        # allows a manual run from the Actions tab any time

permissions:
  contents: write

# avoid overlapping runs racing on the same push
concurrency:
  group: worldcup-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release

      - name: Install dependencies
        run: Rscript -e 'install.packages(c("jsonlite","curl"), repos="https://cloud.r-project.org")'

      - name: Compute predictions
        env:
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}
        run: Rscript scripts/worldcup_predictions.R

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/worldcup.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update World Cup predictions"
            git pull --rebase --autostash
            git push
          fi
